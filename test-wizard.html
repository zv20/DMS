<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Wizard - Test Page</title>
    
    <!-- Wizard Styles -->
    <link rel="stylesheet" href="css/wizard-styles.css">
    
    <style>
        /* Basic page styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .test-header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .test-header h1 {
            color: #2c3e50;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .test-header p {
            color: #6c757d;
            font-size: 1.1rem;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 15px;
            background: #28a745;
            color: white;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
        }
        
        #templateBuilder {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            padding: 20px;
        }
        
        .debug-panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-top: 30px;
        }
        
        .debug-panel h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .debug-content {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .debug-buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .debug-btn {
            padding: 8px 16px;
            border: 2px solid #007bff;
            background: white;
            color: #007bff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        
        .debug-btn:hover {
            background: #007bff;
            color: white;
        }
        
        @media print {
            body {
                background: white;
            }
            
            .test-header,
            .mode-switcher,
            .wizard-navigation,
            .debug-panel {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="test-container">
        <!-- Test Header -->
        <div class="test-header">
            <h1>🧙 Template Wizard Test</h1>
            <p>Complete template customization in 6 easy steps</p>
            <span class="status-badge">✅ All 7 Phases Implemented</span>
        </div>
        
        <!-- Template Builder -->
        <div id="templateBuilder">
            <!-- Mode Switcher -->
            <div class="mode-switcher">
                <button class="mode-btn active" data-mode="wizard">🧙 Wizard Mode</button>
                <button class="mode-btn" data-mode="advanced">⚙️ Advanced Mode</button>
            </div>

            <!-- Wizard Container -->
            <div id="wizardContainer" class="wizard-container">
                <!-- Wizard content will be dynamically inserted here -->
            </div>

            <!-- Advanced Mode Container (placeholder) -->
            <div id="advancedContainer" class="advanced-container" style="display: none;">
                <div style="padding: 40px; text-align: center; color: #6c757d;">
                    <h2>⚙️ Advanced Mode</h2>
                    <p style="margin-top: 10px;">Advanced template builder will be here</p>
                    <p style="margin-top: 20px; font-size: 0.9rem;">
                        <em>Switch back to Wizard Mode to test the wizard implementation</em>
                    </p>
                </div>
            </div>
        </div>
        
        <!-- Debug Panel -->
        <div class="debug-panel">
            <h3>🐛 Debug Panel</h3>
            <div class="debug-content" id="debugContent">
                Waiting for wizard initialization...
            </div>
            <div class="debug-buttons">
                <button class="debug-btn" onclick="showWizardData()">📊 Show Wizard Data</button>
                <button class="debug-btn" onclick="showLocalStorage()">💾 Show Saved Templates</button>
                <button class="debug-btn" onclick="clearLocalStorage()">🗑️ Clear Storage</button>
                <button class="debug-btn" onclick="exportData()">📥 Export Data (JSON)</button>
                <button class="debug-btn" onclick="checkIntegrity()">✅ Check Integrity</button>
            </div>
        </div>
    </div>

    <!-- Wizard Scripts (in correct order!) -->
    <script src="js/template/wizard-steps.js"></script>
    <script src="js/template/wizard-step5.js"></script>
    <script src="js/template/wizard-step6.js"></script>
    <script src="js/template/template-wizard.js"></script>

    <!-- Initialization & Debug Scripts -->
    <script>
        // Debug logging
        function log(message, type = 'info') {
            const debugContent = document.getElementById('debugContent');
            const timestamp = new Date().toLocaleTimeString();
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
            debugContent.innerHTML += `<div style="margin-bottom: 5px;"><strong>[${timestamp}]</strong> ${icon} ${message}</div>`;
            debugContent.scrollTop = debugContent.scrollHeight;
        }
        
        // Debug functions
        function showWizardData() {
            if (window.templateWizard && window.templateWizard.wizardData) {
                const data = JSON.stringify(window.templateWizard.wizardData, null, 2);
                alert('Current Wizard Data:\n\n' + data);
                log('Wizard data displayed', 'success');
            } else {
                alert('No wizard data available yet');
                log('No wizard data', 'error');
            }
        }
        
        function showLocalStorage() {
            const templates = localStorage.getItem('mealPlanTemplates');
            if (templates) {
                const parsed = JSON.parse(templates);
                alert(`Saved Templates (${parsed.length}):\n\n` + JSON.stringify(parsed, null, 2));
                log(`Displayed ${parsed.length} saved templates`, 'success');
            } else {
                alert('No templates saved yet');
                log('No saved templates', 'info');
            }
        }
        
        function clearLocalStorage() {
            if (confirm('Clear all saved templates?\n\nThis action cannot be undone.')) {
                localStorage.removeItem('mealPlanTemplates');
                alert('✅ Storage cleared!');
                log('LocalStorage cleared', 'success');
            }
        }
        
        function exportData() {
            if (window.templateWizard && window.templateWizard.wizardData) {
                const data = JSON.stringify(window.templateWizard.wizardData, null, 2);
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'wizard-data.json';
                a.click();
                log('Data exported to JSON', 'success');
            } else {
                alert('No data to export');
                log('Export failed - no data', 'error');
            }
        }
        
        function checkIntegrity() {
            const checks = [];
            
            // Check WizardSteps
            if (window.WizardSteps) {
                checks.push('✅ WizardSteps loaded');
                checks.push(`   - Steps: ${window.WizardSteps.steps.length}`);
                checks.push(`   - Layouts: ${window.WizardSteps.layouts.length}`);
                checks.push(`   - Themes: ${window.WizardSteps.themes.length}`);
            } else {
                checks.push('❌ WizardSteps NOT loaded');
            }
            
            // Check TemplateWizard
            if (window.TemplateWizard) {
                checks.push('✅ TemplateWizard class loaded');
            } else {
                checks.push('❌ TemplateWizard class NOT loaded');
            }
            
            // Check Instance
            if (window.templateWizard) {
                checks.push('✅ Wizard instance initialized');
                checks.push(`   - Current step: ${window.templateWizard.currentStep}`);
            } else {
                checks.push('❌ Wizard instance NOT initialized');
            }
            
            // Check DOM elements
            const container = document.getElementById('wizardContainer');
            if (container && container.innerHTML.trim() !== '') {
                checks.push('✅ Wizard UI rendered');
            } else {
                checks.push('❌ Wizard UI NOT rendered');
            }
            
            alert('Integrity Check:\n\n' + checks.join('\n'));
            log('Integrity check completed', 'success');
        }
        
        // Initialize wizard when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM Content Loaded', 'success');
            
            // Mode switcher logic
            const modeBtns = document.querySelectorAll('.mode-btn');
            const wizardContainer = document.getElementById('wizardContainer');
            const advancedContainer = document.getElementById('advancedContainer');
            
            modeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const mode = this.getAttribute('data-mode');
                    log(`Switching to ${mode} mode`);
                    
                    // Update active button
                    modeBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // Show/hide containers
                    if (mode === 'wizard') {
                        wizardContainer.style.display = 'block';
                        advancedContainer.style.display = 'none';
                        
                        // Initialize wizard if not already done
                        if (!window.templateWizard) {
                            try {
                                log('Initializing Template Wizard...');
                                window.templateWizard = new TemplateWizard();
                                log('Template Wizard initialized successfully!', 'success');
                            } catch (error) {
                                log('Failed to initialize wizard: ' + error.message, 'error');
                                console.error('Wizard initialization error:', error);
                            }
                        }
                    } else {
                        wizardContainer.style.display = 'none';
                        advancedContainer.style.display = 'block';
                    }
                });
            });
            
            // Auto-initialize wizard on load
            log('Auto-initializing wizard...');
            document.querySelector('[data-mode="wizard"]').click();
        });
        
        // Log page load
        window.addEventListener('load', function() {
            log('Page fully loaded', 'success');
            setTimeout(() => {
                checkIntegrity();
            }, 1000);
        });
    </script>
</body>
</html>
